}

/* ═══════════════ DISTRIBUTION CANVAS ═══════════════ */
function initDist(){
  const c=document.getElementById('dist-canvas');
  if(!c)return;
  const ctx=c.getContext('2d'),W=c.width,H=c.height;
  const sel=document.getElementById('dist-sel');
  const p1s=document.getElementById('p1'),p2s=document.getElementById('p2');
  const p1v=document.getElementById('p1-v'),p2v=document.getElementById('p2-v');
  const p1l=document.getElementById('p1-lbl'),p2l=document.getElementById('p2-lbl');
  const lbl=document.getElementById('dist-lbl'),out=document.getElementById('dist-out');

  function normal(x,mu,sig){return Math.exp(-0.5*((x-mu)/sig)**2)/(sig*Math.sqrt(2*Math.PI));}
  function exp_(x,la){return x<0?0:la*Math.exp(-la*x);}

  function draw(){
    const dist=sel.value;
    const p1=parseInt(p1s.value)/10, p2=parseInt(p2s.value)/10;

    let labels=['μ','σ'],vals=[p1.toFixed(1),p2.toFixed(1)];
    if(dist==='uniform'){labels=['a','b'];vals=[(p1).toFixed(1),(p2).toFixed(1)];}
    else if(dist==='exponential'){labels=['λ','']; vals=[p2.toFixed(1),''];}
    else if(dist==='binomial'){labels=['n','p']; vals=['10',(p2/3+0.1).toFixed(2)];}
    p1l.textContent=labels[0]; p2l.textContent=labels[1];
    p1v.textContent=vals[0]; p2v.textContent=vals[1];

    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#07090f';ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='#1e2d42';ctx.lineWidth=0.5;
    for(let i=0;i<5;i++){const y=H/5*i;ctx.beginPath();ctx.moveTo(40,y);ctx.lineTo(W-10,y);ctx.stroke();}

    const pts=[], cpts=[];
    let xMin=-4,xMax=4,maxY=0;

    if(dist==='normal'){
      const mu=p1, sig=Math.max(p2/3,0.1)+0.3;
      xMin=mu-4*sig; xMax=mu+4*sig;
      for(let x=xMin;x<=xMax;x+=(xMax-xMin)/200){
        const y=normal(x,mu,sig); pts.push({x,y}); if(y>maxY)maxY=y;
      }
      labels=['μ (mean)','σ (std)']; p1l.textContent='μ'; p2l.textContent='σ';
      p1v.textContent=mu.toFixed(1); p2v.textContent=sig.toFixed(2);
      out.textContent=`N(μ=${mu.toFixed(1)}, σ=${sig.toFixed(2)}) | E[X]=${mu.toFixed(1)} | Var=${(sig**2).toFixed(2)} | 68% in [${(mu-sig).toFixed(1)}, ${(mu+sig).toFixed(1)}]`;
      lbl.textContent='Gaussian (Normal) PDF — bell curve';
    } else if(dist==='uniform'){
      const a=p1-1, b=p1+p2/3+1.5;
      xMin=a-1; xMax=b+1;
      const h=1/(b-a);
      maxY=h*1.2;
      for(let x=xMin;x<=xMax;x+=(xMax-xMin)/200){
        const y=(x>=a&&x<=b)?h:0; pts.push({x,y});
      }
      out.textContent=`Uniform[${a.toFixed(1)}, ${b.toFixed(1)}] | E[X]=${((a+b)/2).toFixed(2)} | PDF=${h.toFixed(3)}`;
      lbl.textContent='Uniform PDF — flat/equal probability everywhere';
    } else if(dist==='exponential'){
      const la=Math.max(p2/3+0.2,0.1);
      xMin=0; xMax=6/la; maxY=la;
      for(let x=0;x<=xMax;x+=xMax/200){
        const y=exp_(x,la); pts.push({x,y}); if(y>maxY)maxY=y;
      }
      p1l.textContent='(unused)'; p2l.textContent='λ (rate)'; p2v.textContent=la.toFixed(2);
      out.textContent=`Exponential(λ=${la.toFixed(2)}) | E[X]=1/λ=${(1/la).toFixed(2)} | Var=${(1/la**2).toFixed(2)}`;
      lbl.textContent='Exponential PDF — time between events';
    } else if(dist==='binomial'){
      const n=10, prob=Math.min(Math.max(p2/10+0.05,0.05),0.95);
      xMin=-0.5; xMax=n+0.5; maxY=0;
      const fact=n=>n<=1?1:n*fact(n-1);
      const C=(n,k)=>fact(n)/(fact(k)*fact(n-k));
      for(let k=0;k<=n;k++){
        const y=C(n,k)*Math.pow(prob,k)*Math.pow(1-prob,n-k);
        pts.push({x:k,y,disc:true}); if(y>maxY)maxY=y;
      }
      p1l.textContent='n=10 (fixed)'; p2l.textContent='p'; p2v.textContent=prob.toFixed(2);
      out.textContent=`Binomial(10, ${prob.toFixed(2)}) | E[X]=${(10*prob).toFixed(1)} | Var=${(10*prob*(1-prob)).toFixed(2)}`;
      lbl.textContent='Binomial PMF — number of successes in 10 trials';
    }

    if(pts.length===0)return;
    maxY*=1.15;
    const cx=x=>(x-xMin)/(xMax-xMin)*(W-50)+40;
    const cy=y=>H-20-(y/maxY)*(H-40);

    // CDF overlay
    ctx.beginPath();ctx.strokeStyle='rgba(251,191,36,.4)';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
    let cdf=0;
    const step=(xMax-xMin)/200;
    pts.forEach((p,i)=>{
      if(p.disc){cdf+=p.y;}else{cdf+=p.y*step;}
      const fc=Math.min(cdf,1);
      i===0?ctx.moveTo(cx(p.x),cy(fc*maxY)):ctx.lineTo(cx(p.x),cy(fc*maxY));
    });
    ctx.stroke();ctx.setLineDash([]);

    // PDF/PMF
    if(pts[0].disc){
      pts.forEach(p=>{
        ctx.fillStyle='rgba(0,229,160,.6)';
        const bw=Math.min(30,(W-50)/pts.length*0.7);
        ctx.fillRect(cx(p.x)-bw/2,cy(p.y),bw,cy(0)-cy(p.y));
        ctx.fillStyle='#00e5a0';
        ctx.fillRect(cx(p.x)-bw/2,cy(p.y),bw,3);
      });
    } else {
      ctx.beginPath();ctx.strokeStyle='#00e5a0';ctx.lineWidth=2.5;
      pts.forEach((p,i)=>{i===0?ctx.moveTo(cx(p.x),cy(p.y)):ctx.lineTo(cx(p.x),cy(p.y));});
      ctx.stroke();
      ctx.beginPath();ctx.fillStyle='rgba(0,229,160,.08)';
      pts.forEach((p,i)=>{i===0?ctx.moveTo(cx(p.x),cy(0)):null; ctx.lineTo(cx(p.x),cy(p.y));});
      ctx.lineTo(cx(pts[pts.length-1].x),cy(0));ctx.closePath();ctx.fill();
    }

    // legend
    ctx.font='11px JetBrains Mono';
    ctx.fillStyle='#00e5a0'; ctx.fillText('PDF/PMF',W-90,18);
    ctx.fillStyle='rgba(251,191,36,.8)'; ctx.fillText('CDF',W-90,32);
  }

  sel.addEventListener('change',draw);
  p1s.addEventListener('input',draw);
  p2s.addEventListener('input',draw);
  draw();
}

/* ═══════════════ BAYES CANVAS ═══════════════ */
function initBayes(){
  const c=document.getElementById('bayes-canvas');
  if(!c)return;
  const ctx=c.getContext('2d'),W=c.width,H=c.height;
  const prevS=document.getElementById('prev-s');
  const sensS=document.getElementById('sens-s');
  const specS=document.getElementById('spec-s');
  const prevV=document.getElementById('prev-v');
  const sensV=document.getElementById('sens-v');
  const specV=document.getElementById('spec-v');
  const out=document.getElementById('bayes-out');

  function draw(){
    const prev=parseInt(prevS.value)/100;
    const sens=parseInt(sensS.value)/100;
    const spec=parseInt(specS.value)/100;
    prevV.textContent=Math.round(prev*100)+'%';
    sensV.textContent=Math.round(sens*100)+'%';
    specV.textContent=Math.round(spec*100)+'%';

    const pPos = sens*prev + (1-spec)*(1-prev);
    const pDisPos = (sens*prev)/pPos;
    const pDisNeg = ((1-sens)*prev)/(1-pPos);

    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#07090f';ctx.fillRect(0,0,W,H);

    // Population bar
    const bw=W-80,bh=40,bx=40,by=20;
    ctx.fillStyle='#1e2d42';ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle='rgba(251,113,133,.5)';ctx.fillRect(bx,by,bw*prev,bh);
    ctx.font='11px JetBrains Mono';
    ctx.fillStyle='#f0f6ff';ctx.fillText(`Population: ${(prev*100).toFixed(0)}% disease (red) | ${((1-prev)*100).toFixed(0)}% healthy (dark)`,bx,by+bh+14);

    // Test positive bar
    const tpy=90,tp=pPos;
    ctx.fillStyle='#1e2d42';ctx.fillRect(bx,tpy,bw,bh);
    const tp_dis=sens*prev;
    const tp_nodis=(1-spec)*(1-prev);
    ctx.fillStyle='rgba(251,113,133,.7)';ctx.fillRect(bx,tpy,bw*tp_dis,bh);
    ctx.fillStyle='rgba(56,189,248,.3)';ctx.fillRect(bx+bw*tp_dis,tpy,bw*tp_nodis,bh);
    ctx.fillStyle='#f0f6ff';ctx.fillText(`Test+ (${(pPos*100).toFixed(1)}%): true+ (red) vs false+ (blue)`,bx,tpy+bh+14);

    // PPV bar
    const pvy=150;
    ctx.fillStyle='#1e2d42';ctx.fillRect(bx,pvy,bw,30);
    ctx.fillStyle=pDisPos>0.5?'rgba(0,229,160,.7)':'rgba(251,191,36,.7)';
    ctx.fillRect(bx,pvy,bw*pDisPos,30);
    ctx.fillStyle='#f0f6ff';ctx.fillText(`P(disease | test+) = ${(pDisPos*100).toFixed(1)}%  ← Posterior Probability`,bx,pvy+30+14);

    out.textContent=`P(disease|+) = ${(pDisPos*100).toFixed(1)}% | P(disease|−) = ${(pDisNeg*100).toFixed(1)}% | False positive rate = ${((1-spec)*100).toFixed(0)}%`;
  }

  prevS.addEventListener('input',draw);
  sensS.addEventListener('input',draw);
  specS.addEventListener('input',draw);
  draw();
}

buildAll();
setTimeout(initDist,200);
</script>
