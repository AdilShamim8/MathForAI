  <div class="card">

    <p>Think of these as a <span class="hl-blue">hierarchy of containers</span>:</p>
    <table>
      <tr><th>Name</th><th>Dimensions</th><th>Example</th><th>Shape Notation</th></tr>
      <tr><td><span class="hl-green">Scalar</span></td><td>0D — single number</td><td>Temperature = 37.5°C</td><td><code>()</code> or just a number</td></tr>
      <tr><td><span class="hl-blue">Vector</span></td><td>1D — list of numbers</td><td>Price list = [100, 200, 350]</td><td><code>(3,)</code></td></tr>
      <tr><td><span class="hl-purple">Matrix</span></td><td>2D — table of numbers</td><td>Spreadsheet: rows × cols</td><td><code>(3, 4)</code></td></tr>
      <tr><td><span class="hl-red">Tensor</span></td><td>N-dimensional</td><td>RGB image, video batch</td><td><code>(batch, C, H, W)</code></td></tr>
    </table>
    <div class="formula-label">First-Principle Thinking: Scalar ⊂ Vector ⊂ Matrix ⊂ Tensor</div>

  <div class="card">
    <div class="card-title"><span class="icon">🇧🇩</span> বাংলা ব্যাখ্যা</div>
    <p class="bn">চিন্তা করুন এটা একটা <strong>ধারকের শ্রেণিবিন্যাস</strong> (hierarchy of containers):</p>
    <br>
    <p class="bn"><span style="color:var(--green)">স্কেলার (Scalar)</span> → একটাই সংখ্যা। যেমন: তোমার বয়স = ২৫। কোনো দিক নেই, শুধু মাত্রা আছে।</p>
    <p class="bn"><span style="color:var(--blue)">ভেক্টর (Vector)</span> → সংখ্যার একটা তালিকা। যেমন: তোমার [উচ্চতা, ওজন, বয়স] = [175, 70, 25]। এটা একটা দিক ও মাত্রা আছে।</p>
    <p class="bn"><span style="color:var(--purple)">ম্যাট্রিক্স (Matrix)</span> → সংখ্যার একটা টেবিল (rows × columns)। ক্লাসে ছাত্রদের নম্বরের স্প্রেডশিট চিন্তা করো।</p>

  <div class="card">
    <div class="card-title"><span class="icon">💼</span> INTERVIEW Q&A</div>
    <div class="qa-item">
      <div class="q" onclick="toggleQ(this)">Q1: What is the difference between a matrix rank and a tensor rank (in ML context)? <span class="q-arrow">▶</span></div>
      <div class="a"><span class="hl-blue">Matrix rank</span> = number of linearly independent rows/columns (related to information content). <span class="hl-red">Tensor rank</span> in ML = number of dimensions (axes) in the tensor. Example: A 3D tensor has rank 3. These are completely different concepts — don't confuse them in interviews! <br><br><span class="bn">বাংলায়: ম্যাট্রিক্স র‍্যাঙ্ক = তথ্যের স্বাধীন সারির সংখ্যা। টেন্সর র‍্যাঙ্ক = মাত্রার সংখ্যা।</span></div>
    </div>
    <div class="qa-item">
      <div class="q" onclick="toggleQ(this)">Q2: Why do we use tensors in deep learning instead of just matrices? <span class="q-arrow">▶</span></div>
      <div class="a">Real-world data is inherently multi-dimensional. Images have spatial (H,W) + color (C) dimensions. When training in batches, we add a batch dimension. For video, we add time. Tensors naturally represent all this. Also, GPU hardware is optimized for batched tensor operations — processing 32 images simultaneously is much faster than one at a time. <br><br><span class="bn">বাংলায়: বাস্তব ডেটা বহু-মাত্রিক। ছবিতে উচ্চতা, প্রস্থ, রঙ — এগুলো আলাদা মাত্রা। টেন্সর এটা সহজে ধরে রাখে।</span></div>
    </div>
    <div class="qa-item">
      <div class="q" onclick="toggleQ(this)">Q3: In NumPy, what is the difference between shape (3,) and shape (3,1)? <span class="q-arrow">▶</span></div>
      <div class="a"><code>(3,)</code> is a 1D array (vector) — it has no concept of row/column orientation. <code>(3,1)</code> is a 2D column vector — a matrix with 3 rows and 1 column. This distinction matters for broadcasting! <code>np.dot(A, v)</code> behaves differently depending on v's shape. Always use <code>.reshape(-1,1)</code> when you need an explicit column vector. <br><br><span class="bn">বাংলায়: (3,) হলো সরল তালিকা। (3,1) হলো স্পষ্টভাবে কলাম ভেক্টর। এই পার্থক্য broadcasting-এ গুরুত্বপূর্ণ।</span></div>
    </div>
  </div>

      <p style="color:var(--muted);margin-top:6px;font-size:0.88em">Answer: (a) scalar (b) (5,) (c) (28,28) matrix (d) (64,3,32,32) tensor</p>
    </div>
    <div class="exercise-box">

      <div class="formula-box">import numpy as np
a = np.zeros(5)          # (a) zero vector
b = np.ones((3, 4))      # (b) ones matrix
c = np.random.randn(2,3,4) # (c) random tensor
print(a.shape, b.shape, c.shape)</div>

{
  title:"Vector & Matrix Operations",
  bn_title:"ভেক্টর ও ম্যাট্রিক্স অপারেশন",
  tags:["Operations","Broadcasting","Element-wise"],
  content:`
  <div class="card law-card">
    <div class="card-title"><span class="icon">⚡</span> LAW 1 — PREDICTION FIRST</div>
    <p>Can you add a vector of shape <code>(3,)</code> to a matrix of shape <code>(4, 3)</code>? Think before reading!</p>
    <p style="margin-top:8px;color:var(--teal)">✅ YES! This is called <strong>broadcasting</strong>. The vector gets "broadcast" across each of the 4 rows. Result shape: <code>(4, 3)</code>.</p>
  </div>
  <div class="card law-card law2">
    <div class="card-title"><span class="icon">🔴</span> LAW 2 — FAILURE MODES</div>
    <ul style="padding-left:16px;color:var(--muted)">
      <li>❌ Adding matrices of incompatible shapes (e.g., 3×2 + 2×3) — shape mismatch error!</li>
      <li>❌ Confusing element-wise multiply (<code>*</code>) with matrix multiply (<code>@</code> or <code>np.dot</code>)</li>
      <li>❌ Forgetting that matrix addition requires <strong>exactly the same shape</strong></li>
    </ul>
  </div>

  <div class="card">
    <div class="card-title"><span class="icon">📖</span> CORE CONCEPT — English</div>
    <p><strong>Vector Operations:</strong></p>
    <ol class="step-list">
      <li><strong>Addition/Subtraction:</strong> Add corresponding elements. Same shape required.</li>
      <li><strong>Scalar Multiplication:</strong> Multiply every element by the scalar.</li>
      <li><strong>Element-wise (Hadamard) Product:</strong> Multiply element by element (same shape).</li>
    </ol>
    <p style="margin-top:12px"><strong>Matrix Operations:</strong></p>
    <ol class="step-list">
      <li><strong>Matrix Addition:</strong> Same shape, add element by element.</li>
      <li><strong>Scalar × Matrix:</strong> Scale every element.</li>
      <li><strong>Broadcasting:</strong> NumPy/PyTorch auto-expand smaller arrays to match shape.</li>
    </ol>
  </div>

  <div class="card">
    <div class="card-title"><span class="icon">🇧🇩</span> বাংলা ব্যাখ্যা</div>
    <p class="bn"><strong>ভেক্টর যোগ (Vector Addition):</strong> দুটো দলের খেলোয়াড়দের স্কোর যোগ করার মতো — প্রতিটা অবস্থানের সংখ্যা আলাদা আলাদাভাবে যোগ হয়।</p>
    <br>
    <p class="bn"><strong>স্কেলার গুণ:</strong> যদি প্রতিটা জিনিসের দাম ২ গুণ হয়, তাহলে পুরো মূল্য তালিকাকে ২ দিয়ে গুণ করো।</p>
    <br>
    <p class="bn"><strong>Hadamard Product (⊙):</strong> Element-wise গুণ। যেমন দুটো ছবির পিক্সেল পরস্পরের সাথে গুণ করা।</p>
    <br>
    <p class="bn"><strong>Broadcasting:</strong> একটা ছোট অ্যারেকে বড় অ্যারের সাথে মেলানোর জন্য স্বয়ংক্রিয়ভাবে প্রসারিত করা। যেমন: প্রতিটা সারিতে একই বায়াস যোগ করা।</p>
  </div>

  <div class="card">
    <div class="card-title"><span class="icon">📐</span> FORMULAS</div>
    <div class="formula-label">Vector Addition</div>
    <div class="formula-box"><span style="color:var(--blue)">u</span> + <span style="color:var(--purple)">v</span> = [u₁+v₁, u₂+v₂, u₃+v₃]
Example: [1,2,3] + [4,5,6] = [5,7,9]</div>
    <div class="formula-label">Scalar Multiplication</div>
    <div class="formula-box">c·<span style="color:var(--blue)">v</span> = [c·v₁, c·v₂, c·v₃]
Example: 3·[1,2,3] = [3,6,9]</div>
    <div class="formula-label">Element-wise (Hadamard) Product ⊙</div>
    <div class="formula-box"><span style="color:var(--blue)">u</span> ⊙ <span style="color:var(--purple)">v</span> = [u₁·v₁, u₂·v₂, u₃·v₃]  (NOT matrix multiply!)
Example: [1,2,3] ⊙ [4,5,6] = [4,10,18]</div>
    <div class="formula-label">Broadcasting Example</div>
    <div class="formula-box">A shape (4,3) + b shape (3,) → b is broadcast to (4,3)
⎡1 2 3⎤   ⎡10 20 30⎤   ⎡11 22 33⎤
⎢4 5 6⎥ + ⎢10 20 30⎥ = ⎢14 25 36⎥  (b replicated 4 times)
⎢7 8 9⎥   ⎢10 20 30⎥   ⎢17 28 39⎥
⎣2 3 4⎦   ⎣10 20 30⎦   ⎣12 23 34⎦</div>
  </div>

  <div class="analogy-box">
    <div class="card-title"><span class="icon">🎯</span> ANALOGY</div>
    <p><strong>Think of a restaurant bill:</strong></p>
    <ul style="padding-left:16px">
      <li>🍽️ <span class="hl-blue">Vector addition</span> = Adding two tables' orders item by item</li>
      <li>💰 <span class="hl-green">Scalar multiply</span> = Applying 20% service charge to every item</li>
      <li>🎁 <span class="hl-purple">Hadamard product</span> = Applying a different discount % to each item separately</li>
      <li>📢 <span class="hl-red">Broadcasting</span> = Adding the same cover charge to every table</li>
    </ul>
  </div>

  <div class="ml-app-box">
    <h4>🤖 ML Application</h4>
    <table>
      <tr><th>ML Operation</th><th>Mathematical Operation</th></tr>
      <tr><td>Add bias to all neurons</td><td>Broadcasting: <code>z = Wx + b</code> (b broadcasts over batch)</td></tr>
      <tr><td>Batch normalization</td><td>Element-wise subtract mean, divide by std</td></tr>
      <tr><td>Gradient updates</td><td>Vector subtraction: <code>θ ← θ - α·∇θ</code></td></tr>
      <tr><td>Attention masking</td><td>Element-wise multiply by mask (0s and 1s)</td></tr>
      <tr><td>Dropout</td><td>Hadamard product with random 0/1 mask</td></tr>
    </table>
  </div>

  <div class="card">
    <div class="card-title"><span class="icon">💼</span> INTERVIEW Q&A</div>
    <div class="qa-item">
      <div class="q" onclick="toggleQ(this)">Q1: Explain broadcasting with an example from neural networks. <span class="q-arrow">▶</span></div>
      <div class="a">In a fully connected layer, we compute <code>Z = XW + b</code>. X has shape <code>(batch, features)</code>, W has shape <code>(features, neurons)</code>, so XW has shape <code>(batch, neurons)</code>. The bias <code>b</code> has shape <code>(neurons,)</code>. Broadcasting automatically adds b to every row (every sample in the batch) without needing to manually repeat it. <br><br><span class="bn">বাংলায়: প্রতিটা নমুনার (batch) সাথে একই bias যোগ করতে broadcasting ব্যবহার হয়।</span></div>
    </div>
    <div class="qa-item">
      <div class="q" onclick="toggleQ(this)">Q2: What is the difference between * and @ (or np.dot) in Python/NumPy? <span class="q-arrow">▶</span></div>
      <div class="a"><code>*</code> is element-wise (Hadamard) multiplication — shapes must be broadcastable. <code>@</code> or <code>np.dot</code> is matrix multiplication — inner dimensions must match. Example: for A(2,3) and B(3,4), <code>A@B</code> gives shape (2,4) but <code>A*B</code> would fail (shape mismatch). This is one of the most common bugs in ML code!<br><br><span class="bn">বাংলায়: * মানে প্রতিটা উপাদান আলাদাভাবে গুণ। @ মানে আসল ম্যাট্রিক্স গুণ।</span></div>
    </div>

    <p class="bn"><strong>Ax = b</strong> মানে: A ম্যাট্রিক্স দিয়ে x ভেক্টর গুণ করলে b পাওয়া যাবে।</p>
    <p class="bn">এটা মূলত বলছে: "x এমন একটা ভেক্টর খুঁজে বের করো যেটাকে A দিয়ে transform করলে b পাওয়া যায়।"</p>

    <p class="bn">🤔 সমীকরণ > অজানা → সরাসরি সমাধান নেই, least squares দিয়ে সেরা সমাধান খুঁজি</p>
    <p class="bn">♾️ সমীকরণ < অজানা → অসংখ্য সমাধান আছে</p>
    <br>
    <p class="bn">📊 <strong>Linear Regression একটা overdetermined system!</strong> n টা ডেটা পয়েন্ট থেকে মাত্র k টা parameter শিখতে হয়। সেরা fit = least squares।</p>
  </div>

  <div class="card">
    <div class="card-title"><span class="icon">📐</span> FORMULAS</div>
    <div class="formula-label">Linear System (Ax = b)</div>
    <div class="formula-box">System: 2x + y = 5          Matrix form: ⎡2  1⎤⎡x⎤   ⎡5⎤
         x - y = 1                         ⎣1 -1⎦⎣y⎦ = ⎣1⎦
                                              A      x    b

Solution: x = A⁻¹b = [[1/3, 1/3],[1/3,-2/3]] × [5,1]ᵀ = [2, 1]ᵀ</div>
    <div class="formula-label">Normal Equation (Linear Regression)</div>
    <div class="formula-box">Minimize: ||Xθ - y||²   (sum of squared errors)

Setting gradient to zero → <span style="color:var(--green)">θ = (XᵀX)⁻¹Xᵀy</span>

In code (preferred over explicit inverse):
θ, _, _, _ = np.linalg.lstsq(X, y, rcond=None)</div>
    <div class="formula-label">Gaussian Elimination (to solve Ax=b)</div>
    <div class="formula-box">Augmented matrix [A|b] → Row operations → [I|x]
Steps: (1) Forward elimination to upper triangular
       (2) Back substitution to get solution</div>
  </div>

  <div class="ml-app-box">
    <h4>🤖 ML Application</h4>
    <table>
      <tr><th>ML Algorithm</th><th>Linear System Solved</th></tr>
      <tr><td>Linear Regression</td><td><code>θ = (XᵀX)⁻¹Xᵀy</code> (overdetermined)</td></tr>
      <tr><td>Ridge Regression</td><td><code>θ = (XᵀX + λI)⁻¹Xᵀy</code></td></tr>
      <tr><td>Gaussian Process</td><td>Solve <code>(K + σ²I)α = y</code></td></tr>
      <tr><td>Newton's method</td><td>Solve Hessian system: <code>H Δθ = ∇L</code></td></tr>
    </table>
  </div>

  <div class="card">
    <div class="card-title"><span class="icon">💼</span> INTERVIEW Q&A</div>
    <div class="qa-item">
      <div class="q" onclick="toggleQ(this)">Q1: Compare Normal Equation vs Gradient Descent for linear regression. <span class="q-arrow">▶</span></div>
      <div class="a">Normal Equation: O(n³) for n features, no hyperparameter (learning rate), gives exact solution in one step, fails with singular/near-singular XᵀX. Gradient Descent: O(kn) per iteration for k iterations, needs learning rate tuning, iterative, works with regularization easily, scales to millions of features. Rule of thumb: Normal equation for n < 10,000 features; gradient descent otherwise.<br><br><span class="bn">বাংলায়: Normal equation একধাপে সমাধান দেয় কিন্তু বড় dataset-এ ধীর। Gradient descent ধীরে ধীরে শেখে কিন্তু scalable।</span></div>
    </div>
    <div class="qa-item">
      <div class="q" onclick="toggleQ(this)">Q2: What does adding λI to XᵀX in Ridge Regression do mathematically? <span class="q-arrow">▶</span></div>
      <div class="a">Adding λI (λ>0) to XᵀX ensures the matrix is always invertible (positive definite), even when XᵀX is rank-deficient. It "regularizes" the problem. Geometrically, it shrinks coefficients toward zero. It prevents overfitting by penalizing large weights. The condition number improves, making the solution numerically stable. This is called Tikhonov regularization.<br><br><span class="bn">বাংলায়: λI যোগ করলে ম্যাট্রিক্স সবসময় invertible হয় এবং বড় coefficient থেকে রক্ষা পাওয়া যায়।</span></div>
    </div>
  </div>
  <div class="card"><div class="card-title"><span class="icon">🏋️</span> EXERCISES</div>
    <div class="exercise-box">
      <h4>Exercise</h4>
      <p>Solve: 3x + 2y = 12 and x + y = 5 using matrix method. Then check: does the normal equation solution minimize sum of squared errors?</p>

  </div>

  content:`
  <div class="card law-card">
    <div class="card-title"><span class="icon">⚡</span> LAW 1 — PREDICTION FIRST</div>
    <p>A neural network layer with a ReLU activation — is it a linear transformation? Predict before reading!</p>
    <p style="margin-top:8px;color:var(--teal)">✅ NO! The matrix multiply part (Wx+b) IS linear (technically "affine" due to bias). But ReLU(x) = max(0,x) breaks linearity because ReLU(x+y) ≠ ReLU(x)+ReLU(y). Non-linearity is what makes deep networks powerful!</p>

  <div class="card">
    <div class="card-title"><span class="icon">📖</span> CORE CONCEPT — English</div>
    <p>A function T is a <span class="hl-blue">linear transformation</span> if it satisfies two rules:</p>
    <div class="grid-2">
      <div style="background:var(--bg3);padding:14px;border-radius:8px">
        <p><span class="hl-green">Rule 1: Additivity</span></p>
        <p>T(u + v) = T(u) + T(v)</p>
        <p style="color:var(--muted);font-size:0.88em">Transform then add = Add then transform</p>
      </div>

        <p><span class="hl-blue">Rule 2: Homogeneity</span></p>
        <p>T(cu) = cT(u)</p>
        <p style="color:var(--muted);font-size:0.88em">Scale then transform = Transform then scale</p>
      </div>
    </div>
    <p style="margin-top:14px"><strong>Every linear transformation can be represented by a matrix!</strong></p>
    <p style="margin-top:8px">Common linear transformations:</p>
    <table>
      <tr><th>Transformation</th><th>Matrix</th><th>Effect</th></tr>
      <tr><td>Scale by s</td><td><code>[[s,0],[0,s]]</code></td><td>Stretch/shrink uniformly</td></tr>
      <tr><td>Rotate by θ</td><td><code>[[cos θ,-sin θ],[sin θ, cos θ]]</code></td><td>Rotate vectors</td></tr>
      <tr><td>Reflect x-axis</td><td><code>[[1,0],[0,-1]]</code></td><td>Flip vertically</td></tr>
      <tr><td>Project onto x-axis</td><td><code>[[1,0],[0,0]]</code></td><td>Collapse y component</td></tr>
    </table>
  </div>

  <div class="card">
    <div class="card-title"><span class="icon">🇧🇩</span> বাংলা ব্যাখ্যা</div>
    <p class="bn"><strong>রৈখিক রূপান্তর</strong> হলো এমন একটা ফাংশন যা স্থানকে "ভাঁজ ছাড়া" রূপান্তর করে।</p>

    <p class="bn">💡 <strong>মনে রাখার উপায়:</strong> রাবারের একটা শিট কল্পনা করো। তুমি এটাকে টেনে লম্বা করতে পারো (scale), ঘোরাতে পারো (rotate), এবং ভাঁজ করতে পারো (shear) — এগুলো সব linear transformation। কিন্তু যদি শিটটাকে মুচড়ে দাও বা ভেঁজে ফেলো — সেটা non-linear!</p>
    <br>
    <p class="bn"><strong>নিউরাল নেটওয়ার্কে:</strong> প্রতিটা layer একটা linear transformation (matrix multiply) + non-linear activation function। Linear শুধু করলে স্তর যতই বাড়াও, একটা linear transformation-ই থাকে — non-linearity ছাড়া deep network কাজ করে না!</p>

  1. T(u+v) = T(u) + T(v)    [additivity]
  2. T(cv) = cT(v)            [scalar homogeneity]
  Combined: T(αu + βv) = αT(u) + βT(v)  [superposition]</div>
    <div class="formula-label">Matrix Representation</div>
    <div class="formula-box">Every linear T: ℝⁿ → ℝᵐ can be written as T(x) = Ax
where A is an m×n matrix.

Example — Rotation by 90°:
T([x,y]) = [-y, x]   →   A = ⎡0 -1⎤
                              ⎣1  0⎦
Check: T([1,0]) = [0,1] ✓   T([0,1]) = [-1,0] ✓</div>
    <div class="formula-label">Composition of Transformations</div>

  <div class="card">

{
  title:"Column Space & Null Space",
  bn_title:"কলাম স্পেস ও নাল স্পেস",
  tags:["Subspaces","Rank-Nullity","Solutions"],
  content:`
  <div class="card law-card">
    <div class="card-title"><span class="icon">⚡</span> LAW 1 — PREDICTION FIRST</div>
    <p>If Ax=b has no solution, what does that tell you about where b lives relative to the column space of A?</p>
    <p style="margin-top:8px;color:var(--teal)">✅ b lies <strong>outside the column space</strong> of A. The column space is all possible outputs of Ax. If b isn't in there, there's no x that can produce it. Least squares finds the closest point IN the column space to b.</p>
  </div>
  <div class="card">
    <div class="card-title"><span class="icon">📖</span> CORE CONCEPT — English</div>
    <p><strong>Column Space C(A):</strong> The set of all possible outputs <code>Ax</code> for any input x.</p>
    <ul style="padding-left:16px;margin:8px 0">
      <li>= All linear combinations of columns of A</li>
      <li>= "What can this matrix produce?"</li>
      <li>dim(C(A)) = rank(A)</li>
    </ul>
    <p style="margin-top:12px"><strong>Null Space N(A):</strong> The set of all inputs x where <code>Ax = 0</code>.</p>
    <ul style="padding-left:16px;margin:8px 0">
      <li>= Vectors that get "annihilated" by A</li>
      <li>= "What inputs produce zero output?"</li>
      <li>dim(N(A)) = nullity(A) = n - rank(A)</li>
    </ul>
    <p style="margin-top:12px"><span class="hl-blue">Rank-Nullity Theorem:</span> rank(A) + nullity(A) = n (columns)</p>
    <p style="color:var(--muted);font-size:0.9em">"The sum of what you can express plus what gets lost = total input dimensions"</p>
  </div>

  <div class="card">
    <div class="card-title"><span class="icon">🇧🇩</span> বাংলা ব্যাখ্যা</div>
    <p class="bn"><strong>কলাম স্পেস (Column Space):</strong> A দিয়ে যত ধরনের output সম্ভব, তার পুরো সংগ্রহ।</p>
    <p class="bn">💡 উদাহরণ: ধরো A একটা projector। কলাম স্পেস হলো দেয়ালে যা যা দেখাতে পারে — projector-এর পরিসর।</p>
    <br>
    <p class="bn"><strong>নাল স্পেস (Null Space):</strong> এমন সব input x যা A দিয়ে transform করলে শূন্য হয়ে যায়।</p>
    <p class="bn">💡 উদাহরণ: projector-এ যদি একটা lens-এর অক্ষ বরাবর আলো দাও, সেটা দেয়ালে কিছুই দেখায় না — এটাই null space।</p>
    <br>
    <p class="bn"><strong>Rank-Nullity Theorem:</strong> rank + nullity = columns</p>
    <p class="bn">মানে: যত information A সংরক্ষণ করে + যত information হারিয়ে ফেলে = মোট input dimension</p>
  </div>

  <div class="card">
    <div class="card-title"><span class="icon">📐</span> FORMULAS & EXAMPLE</div>
    <div class="formula-label">Example — Finding Null Space</div>
    <div class="formula-box">A = ⎡1  2⎤   Find null space: Ax = 0
    ⎣2  4⎦
Row reduce: ⎡1  2 | 0⎤ → ⎡1  2 | 0⎤
            ⎣2  4 | 0⎦   ⎣0  0 | 0⎦
Free variable: x₂ = t. Then x₁ = -2t.
Null space = span{[-2, 1]ᵀ}   (all scalar multiples of [-2,1])

Note: rank(A)=1, nullity(A)=1, n=2. Rank-Nullity: 1+1=2 ✓</div>
    <div class="formula-label">Column Space Example</div>
    <div class="formula-box">A = ⎡1  2⎤   columns are [1,2]ᵀ and [2,4]ᵀ
    ⎣2  4⎦
But col2 = 2×col1! So column space = span{[1,2]ᵀ} — a 1D line!
(rank=1 → column space is 1-dimensional)</div>
  </div>

  <div class="ml-app-box">
    <h4>🤖 ML Application</h4>
    <table>
      <tr><th>ML Context</th><th>Column/Null Space Meaning</th></tr>
      <tr><td>Linear regression</td><td>Col space = all achievable predictions; if y∉col space, use least squares</td></tr>
      <tr><td>Neural network expressiveness</td><td>Column space of W = all possible layer outputs</td></tr>
      <tr><td>Dimensionality reduction</td><td>Find low-dim subspace (column space of reduced A)</td></tr>
      <tr><td>Regularization</td><td>L2 reg prevents weights in null space of data matrix</td></tr>
    </table>
  </div>

  <div class="card">
    <div class="card-title"><span class="icon">💼</span> INTERVIEW Q&A</div>
    <div class="qa-item">
      <div class="q" onclick="toggleQ(this)">Q1: Why does having multiple solutions to Ax=b relate to the null space? <span class="q-arrow">▶</span></div>
      <div class="a">If x₀ is one solution (Ax₀=b) and n is in the null space (An=0), then A(x₀+n)=Ax₀+An=b+0=b. So x₀+n is ALSO a solution. Every vector in the null space generates another solution. If null space is non-trivial (contains non-zero vectors), there are infinitely many solutions. This is why underdetermined systems in ML (more parameters than data) have infinitely many optimal solutions — regularization picks the simplest one!<br><br><span class="bn">বাংলায়: null space-এর প্রতিটা vector একটা নতুন সমাধান তৈরি করে। Regularization "সহজতম" সমাধান বেছে নেয়।</span></div>
    </div>
  </div>
  <div class="card"><div class="card-title"><span class="icon">🔗</span> RESOURCES</div>
    <a class="resource-link" href="https://ocw.mit.edu/courses/18-06sc-linear-algebra-fall-2011/" target="_blank">🎓 MIT 18.06 (Gilbert Strang)</a>
  </div>`
},
{
  title:"Eigenvalues & Eigenvectors",
  bn_title:"আইগেনভ্যালু ও আইগেনভেক্টর",
  tags:["PCA","SVD","Covariance Matrix","Core ML Concept"],
  content:`
  <div class="card law-card">
    <div class="card-title"><span class="icon">⚡</span> LAW 1 — PREDICTION FIRST</div>
    <p>In PCA, what do the eigenvectors of the covariance matrix represent physically?</p>
    <p style="margin-top:8px;color:var(--teal)">✅ They are the <strong>principal components</strong> — the directions of maximum variance in your data! The eigenvector with the largest eigenvalue = direction where data varies the most (PC1). This is the best single axis to project your data onto.</p>
  </div>
  <div class="card law-card law2">
    <div class="card-title"><span class="icon">🔴</span> LAW 2 — FAILURE MODES</div>
    <ul style="padding-left:16px;color:var(--muted)">
      <li>❌ Thinking all matrices have real eigenvectors — only symmetric (and some other) matrices guarantee real eigenvalues</li>
      <li>❌ Computing eigen decomposition of non-square matrices — use SVD instead!</li>
      <li>❌ Forgetting that eigenvectors are only defined up to a scalar multiple — direction matters, not magnitude</li>
    </ul>
  </div>

  <div class="card">
    <div class="card-title"><span class="icon">📖</span> CORE CONCEPT — English</div>
    <p>For a square matrix A, an <span class="hl-blue">eigenvector v</span> is a special vector that, when multiplied by A, <strong>only gets scaled</strong> — it doesn't change direction:</p>
    <div style="background:var(--bg3);padding:14px;border-radius:8px;margin:12px 0;text-align:center">
      <p style="font-size:1.2em"><strong>Av = λv</strong></p>
      <p style="color:var(--muted);margin-top:4px">A × eigenvector = eigenvalue × eigenvector</p>
    </div>
    <ul style="padding-left:16px">
      <li><span class="hl-blue">v</span> = eigenvector (the special direction)</li>
      <li><span class="hl-green">λ</span> (lambda) = eigenvalue (the scaling factor)</li>
      <li>λ > 1 → vector stretches; 0 < λ < 1 → shrinks; λ < 0 → flips direction</li>
      <li>λ = 0 → vector mapped to zero (matrix is singular!)</li>
    </ul>
    <p style="margin-top:12px"><strong>How to find eigenvalues:</strong> Solve <code>det(A - λI) = 0</code></p>
    <p style="margin-top:4px"><strong>How to find eigenvectors:</strong> For each λ, solve <code>(A - λI)v = 0</code></p>
  </div>

  <div class="card">
    <div class="card-title"><span class="icon">🇧🇩</span> বাংলা ব্যাখ্যা</div>
    <p class="bn"><strong>আইগেনভেক্টর</strong> হলো এমন একটা বিশেষ দিক (direction) যেটা ম্যাট্রিক্স transform করলেও পরিবর্তন হয় না — শুধু বড় বা ছোট হয়।</p>
    <br>
    <p class="bn">💡 <strong>সহজ কল্পনা:</strong> একটা ম্যাট্রিক্স রাবারের শিটকে টেনে-বাঁকিয়ে transform করে। বেশিরভাগ দিক বদলে যায়। কিন্তু কিছু বিশেষ দিক আছে (eigenvectors) যেগুলো সেই transform-এর পরেও একই দিকে থাকে — শুধু দীর্ঘ (eigenvalue>1) বা সংক্ষিপ্ত (eigenvalue<1) হয়।</p>
    <br>
    <p class="bn"><strong>PCA-তে ব্যবহার:</strong> Covariance matrix-এর eigenvectors = ডেটার সর্বোচ্চ variance-এর দিক। সবচেয়ে বড় eigenvalue = সবচেয়ে বেশি তথ্যসমৃদ্ধ দিক।</p>
  </div>

  <div class="card">
    <div class="card-title"><span class="icon">📐</span> STEP-BY-STEP EXAMPLE</div>
    <div class="formula-label">Find eigenvalues of A = [[3,1],[0,2]]</div>
    <div class="formula-box">Step 1: Solve det(A - λI) = 0
A - λI = ⎡3-λ   1 ⎤
          ⎣ 0   2-λ⎦

det = (3-λ)(2-λ) - 0×1 = λ² - 5λ + 6 = (λ-3)(λ-2) = 0

<span style="color:var(--green)">λ₁ = 3,  λ₂ = 2</span>  ← eigenvalues

Step 2: Find eigenvectors for λ₁ = 3:
(A - 3I)v = 0  →  ⎡0  1⎤⎡v₁⎤ = 0  →  v₂ = 0, v₁ free
                   ⎣0 -1⎦⎣v₂⎦
<span style="color:var(--blue)">v₁ = [1, 0]ᵀ</span>   (eigenvector for λ₁=3)

For λ₂ = 2: (A-2I)v=0  →  [[1,1],[0,0]]v=0  →  v₁=-v₂
<span style="color:var(--blue)">v₂ = [-1, 1]ᵀ</span>  (eigenvector for λ₂=2)</div>
    <div class="formula-label">Properties of Eigenvalues</div>
    <div class="formula-box">Sum of eigenvalues = trace(A) = Σ diagonal elements
Product of eigenvalues = det(A)
Symmetric matrix A=Aᵀ → all eigenvalues are REAL
Positive definite matrix → all eigenvalues > 0</div>
  </div>

  <div class="analogy-box">
    <div class="card-title"><span class="icon">🎯</span> ANALOGY — The Stretching Directions</div>
    <p>Imagine kneading bread dough (your matrix transformation). Most directions in the dough get twisted and mixed. But there are <strong>special axes</strong> (eigenvectors) where the dough only stretches or compresses — it doesn't rotate around those axes. The <strong>eigenvalue</strong> tells you how much it stretches (>1) or compresses (<1) along that axis.</p>
    <p class="bn" style="margin-top:8px">বাংলায়: রুটির ময়দা মাখার সময় বেশিরভাগ দিক ঘুরে যায়। কিন্তু কিছু বিশেষ অক্ষ শুধু লম্বা বা ছোট হয় — এগুলোই eigenvectors।</p>
  </div>

  <div class="ml-app-box">
    <h4>🤖 ML Application — THIS IS CRITICAL FOR ML!</h4>
    <table>
      <tr><th>ML Algorithm</th><th>How Eigenvalues/Eigenvectors Are Used</th></tr>
      <tr><td><strong>PCA</strong></td><td>Eigenvectors of covariance matrix = principal components; eigenvalues = variance explained</td></tr>
      <tr><td><strong>SVD</strong></td><td>Generalization of eigen decomp for rectangular matrices: A = UΣVᵀ</td></tr>
      <tr><td>Graph Neural Networks</td><td>Graph Laplacian eigenvectors as node features</td></tr>
      <tr><td>Markov chains (RL)</td><td>Stationary distribution = eigenvector with λ=1</td></tr>
      <tr><td>Training stability</td><td>Largest eigenvalue of Hessian = sharpest curvature, limits learning rate</td></tr>
      <tr><td>Power iteration (PageRank)</td><td>Find dominant eigenvector iteratively</td></tr>
    </table>
  </div>

  <div class="card">
    <div class="card-title"><span class="icon">💼</span> INTERVIEW Q&A</div>
    <div class="qa-item">
      <div class="q" onclick="toggleQ(this)">Q1: Explain PCA from the eigenvalue perspective. <span class="q-arrow">▶</span></div>
      <div class="a">PCA steps: (1) Center data (subtract mean). (2) Compute covariance matrix C = XᵀX/(n-1). (3) Find eigenvectors/eigenvalues of C. (4) Sort eigenvectors by decreasing eigenvalue. (5) Project data onto top-k eigenvectors. Why? The covariance matrix is symmetric positive semi-definite, so eigenvectors are orthogonal and eigenvalues ≥ 0. The eigenvector with largest eigenvalue is the direction of maximum variance. Projecting onto it captures the most information in a single dimension.<br><br><span class="bn">বাংলায়: PCA covariance matrix-এর eigenvector খোঁজে — এগুলো data-এর সর্বোচ্চ variance-এর দিক।</span></div>
    </div>
    <div class="qa-item">
      <div class="q" onclick="toggleQ(this)">Q2: What is the relationship between eigendecomposition and SVD? <span class="q-arrow">▶</span></div>
      <div class="a">Eigendecomposition A = QΛQ⁻¹ works only for square matrices. SVD A = UΣVᵀ works for ANY m×n matrix. Connection: The columns of V are eigenvectors of AᵀA; columns of U are eigenvectors of AAᵀ; diagonal entries of Σ are square roots of eigenvalues of AᵀA. For symmetric positive definite A: SVD and eigendecomposition coincide. SVD is more numerically stable and general — always prefer SVD in practice.<br><br><span class="bn">বাংলায়: SVD হলো eigendecomposition-এর generalization — যেকোনো আকারের matrix-এ কাজ করে।</span></div>
    </div>
    <div class="qa-item">
      <div class="q" onclick="toggleQ(this)">Q3: What does it mean if a neural network's Hessian has very large eigenvalues? <span class="q-arrow">▶</span></div>
      <div class="a">Large Hessian eigenvalues = sharp curvature = the loss landscape has steep valleys in some directions. If you take too large a gradient descent step, you'll overshoot. This limits the maximum learning rate. Flat minima (small eigenvalues) generalize better. Modern techniques like Adam, learning rate warmup, and gradient clipping address sharp curvature. LoRA and other methods often work by staying in low-curvature subspaces.<br><br><span class="bn">বাংলায়: বড় eigenvalue = খাড়া loss landscape = ছোট learning rate দরকার, নইলে training unstable হবে।</span></div>
    </div>
  </div>

  <div class="card"><div class="card-title"><span class="icon">🏋️</span> EXERCISES</div>
    <div class="exercise-box">
      <h4>Exercise 1</h4>
      <p>For A = [[4,0],[0,3]], what are the eigenvalues and eigenvectors? (Hint: diagonal matrices make this easy!)</p>
      <p style="color:var(--muted);font-size:0.88em;margin-top:6px">Diagonal matrix! λ₁=4 with v₁=[1,0]ᵀ; λ₂=3 with v₂=[0,1]ᵀ. The basis vectors ARE the eigenvectors!</p>
    </div>
    <div class="exercise-box">
      <h4>Exercise 2 (Conceptual)</h4>
      <p>If a 10D dataset has covariance matrix eigenvalues [5, 3, 1, 0.5, 0.3, 0.2, 0.1, 0.05, 0.03, 0.02], how many PCA components do you keep to explain 80% of variance?</p>
      <p style="color:var(--muted);font-size:0.88em;margin-top:6px">Total variance = 10.2. 80% = 8.16. Sum first 3: 5+3+1=9 > 8.16. Keep 3 components → 3D from 10D! (88% variance explained with just 3 components)</p>
    </div>
  </div>
  <div class="card"><div class="card-title"><span class="icon">🔗</span> RESOURCES</div>
    <a class="resource-link" href="https://www.youtube.com/watch?v=PFDu9oVAE-g" target="_blank">🎬 3B1B: Eigenvalues & Eigenvectors</a>

  </div>`

  content:`
  <div class="card law-card">
    <div class="card-title"><span class="icon">⚡</span> LAW 1 — PREDICTION FIRST</div>
    <p>Why do we want orthogonal weight matrices for neural network initialization?</p>
    <p style="margin-top:8px;color:var(--teal)">✅ Orthogonal matrices <strong>preserve vector norms</strong> (||Qx|| = ||x||). During forward and backward pass, signals don't explode or vanish. This is why orthogonal initialization helps train very deep networks!</p>
  </div>

  <div class="card">
    <div class="card-title"><span class="icon">📖</span> CORE CONCEPT — English</div>
    <p><strong>Orthogonal vectors:</strong> Two vectors a, b are orthogonal if <code>a·b = 0</code> (perpendicular in geometry)</p>
    <p style="margin-top:12px"><strong>Orthonormal vectors:</strong> Orthogonal + unit length. For set {v₁,...,vₙ}:</p>
    <div class="formula-box">vᵢ·vⱼ = 0 if i≠j  (orthogonal)
vᵢ·vᵢ = 1        (unit length)
Combined: vᵢ·vⱼ = δᵢⱼ  (Kronecker delta: 1 if i=j, 0 otherwise)</div>
    <p style="margin-top:12px"><strong>Orthogonal Matrix Q:</strong> A square matrix whose columns are orthonormal vectors.</p>
    <ul style="padding-left:16px">
      <li>QᵀQ = QQᵀ = I (columns are orthonormal)</li>
      <li>Q⁻¹ = Qᵀ (transpose IS the inverse — very cheap!)</li>
      <li>||Qx|| = ||x|| (preserves vector length)</li>
      <li>Examples: rotation matrix, reflection matrix, permutation matrix</li>
    </ul>
  </div>

  <div class="card">
    <div class="card-title"><span class="icon">🇧🇩</span> বাংলা ব্যাখ্যা</div>
    <p class="bn"><strong>অর্থোগোনাল ভেক্টর:</strong> দুটো ভেক্টর পরস্পর লম্ব (90°)। তাদের ডট প্রোডাক্ট = ০।</p>
    <p class="bn">উদাহরণ: পূর্ব দিক এবং উত্তর দিক — এরা পরস্পর অর্থোগোনাল।</p>
    <br>
    <p class="bn"><strong>অর্থোনর্মাল:</strong> পরস্পর লম্ব + প্রতিটার দৈর্ঘ্য = ১।</p>
    <p class="bn">এটা একটা আদর্শ coordinate system — প্রতিটা অক্ষ স্বাধীন এবং একক দৈর্ঘ্যের।</p>
    <br>
    <p class="bn"><strong>অর্থোগোনাল ম্যাট্রিক্স Q:</strong> এটা শুধু ঘোরায়/প্রতিফলিত করে কিন্তু আকার বদলায় না।</p>
    <p class="bn">বিশেষত্ব: Q⁻¹ = Qᵀ — ইনভার্স হিসাব না করেও জানা যায়!</p>
  </div>

  <div class="card">
    <div class="card-title"><span class="icon">📐</span> FORMULAS</div>
    <div class="formula-label">Orthogonality Test</div>
    <div class="formula-box">a = [1, 0],  b = [0, 1]:  a·b = 0 → <span style="color:var(--green)">ORTHOGONAL ✓</span>
a = [1, 1],  b = [1,-1]: a·b = 0 → <span style="color:var(--green)">ORTHOGONAL ✓</span>
a = [1, 2],  b = [1, 1]: a·b = 3 → <span style="color:var(--red)">NOT orthogonal</span></div>
    <div class="formula-label">Orthogonal Matrix Example</div>
    <div class="formula-box">Rotation by 45°:  Q = 1/√2 ⎡1  -1⎤
                                  ⎣1   1⎦
Verify: QᵀQ = 1/2 ⎡1  1⎤⎡1 -1⎤ = ⎡1  0⎤ = I  ✓
                   ⎣-1 1⎦⎣1  1⎦   ⎣0  1⎦</div>
    <div class="formula-label">Gram-Schmidt Process (orthogonalize any set of vectors)</div>
    <div class="formula-box">Given vectors {a₁, a₂, ..., aₙ}, produce orthonormal {q₁, q₂, ..., qₙ}:
q₁ = a₁/||a₁||
u₂ = a₂ - (a₂·q₁)q₁   [remove component along q₁]
q₂ = u₂/||u₂||
u₃ = a₃ - (a₃·q₁)q₁ - (a₃·q₂)q₂  [remove q₁ and q₂ components]
q₃ = u₃/||u₃||   ... and so on</div>
  </div>

  <div class="ml-app-box">
    <h4>🤖 ML Application</h4>
    <table>
      <tr><th>ML Use</th><th>Why Orthogonality Matters</th></tr>
      <tr><td>Weight initialization</td><td>Orthogonal init preserves norms, prevents vanishing/exploding gradients</td></tr>
      <tr><td>QR decomposition</td><td>Numerically stable least squares (prefer over normal equation)</td></tr>
      <tr><td>Attention heads</td><td>Different heads should attend to different (orthogonal) features</td></tr>
      <tr><td>PCA</td><td>Principal components are orthogonal — no redundancy</td></tr>
      <tr><td>Regularization</td><td>Orthogonality constraints in some regularizers</td></tr>
    </table>
  </div>

  <div class="card">
    <div class="card-title"><span class="icon">💼</span> INTERVIEW Q&A</div>
    <div class="qa-item">
      <div class="q" onclick="toggleQ(this)">Q1: Why are principal components orthogonal in PCA? <span class="q-arrow">▶</span></div>
      <div class="a">PCA finds eigenvectors of the symmetric covariance matrix. A key theorem (Spectral Theorem): eigenvectors of a SYMMETRIC matrix corresponding to DIFFERENT eigenvalues are always orthogonal. Since the covariance matrix is symmetric (C = XᵀX/(n-1), which satisfies Cᵀ=C), all its eigenvectors are orthogonal. This is desirable: orthogonal components are statistically uncorrelated — each principal component captures completely independent information!<br><br><span class="bn">বাংলায়: symmetric matrix-এর eigenvectors সবসময় orthogonal। PCA-র components তাই uncorrelated তথ্য ধারণ করে।</span></div>
    </div>
  </div>
  <div class="card"><div class="card-title"><span class="icon">🔗</span> RESOURCES</div>
    <a class="resource-link" href="https://www.youtube.com/watch?v=7nYi7i0MkHQ" target="_blank">🎬 3B1B: Dot Products and Duality</a>
    <a class="resource-link" href="https://pytorch.org/docs/stable/nn.init.html#torch.nn.init.orthogonal_" target="_blank">📘 PyTorch Orthogonal Init</a>
  </div>`

  content:`
  <div class="card law-card">
    <div class="card-title"><span class="icon">⚡</span> LAW 1 — PREDICTION FIRST</div>
    <p>L1 regularization produces sparse models (many weights = 0). L2 regularization makes weights small but rarely zero. Why?</p>
    <p style="margin-top:8px;color:var(--teal)">✅ L1's gradient is ±1 (constant) regardless of weight magnitude, so it keeps pushing small weights all the way to zero. L2's gradient is 2w — when w is already small, the push toward zero is also small. The L1 "diamond" shape in optimization has corners on the axes, where optimal solutions tend to land.</p>
  </div>
  <div class="card law-card law2">
    <div class="card-title"><span class="icon">🔴</span> LAW 2 — FAILURE MODES</div>
    <ul style="padding-left:16px;color:var(--muted)">
      <li>❌ Confusing L2 norm with L2 loss — they're different! L2 norm = ||x||₂ (vector size); L2 loss = MSE (mean squared error between predictions)</li>
      <li>❌ Using L1 loss when you need gradients everywhere — L1 is not differentiable at 0!</li>
      <li>❌ Forgetting to normalize features before computing distances — scale matters!</li>
    </ul>
  </div>

  <div class="card">
    <div class="card-title"><span class="icon">📖</span> CORE CONCEPT — English</div>
    <p>A <span class="hl-blue">norm</span> is a function that measures the "size" or "length" of a vector. The Lp norm family:</p>
    <table>
      <tr><th>Norm</th><th>Formula</th><th>Also Called</th><th>ML Use</th></tr>
      <tr><td><span class="hl-muted">L0</span></td><td>count(non-zero elements)</td><td>Sparsity measure</td><td>Sparse learning (approx)</td></tr>
      <tr><td><span class="hl-blue">L1</span></td><td>||x||₁ = Σ|xᵢ|</td><td>Manhattan / Taxicab</td><td>Lasso regularization</td></tr>
      <tr><td><span class="hl-green">L2</span></td><td>||x||₂ = √(Σxᵢ²)</td><td>Euclidean</td><td>Ridge regularization, SGD, MSE</td></tr>
      <tr><td><span class="hl-gold">L∞</span></td><td>||x||∞ = max(|xᵢ|)</td><td>Chebyshev</td><td>Robust optimization</td></tr>
    </table>
    <p style="margin-top:12px"><strong>Distance = norm of the difference:</strong> dist(a,b) = ||a-b||</p>
  </div>

  <div class="card">
    <div class="card-title"><span class="icon">🇧🇩</span> বাংলা ব্যাখ্যা</div>
    <p class="bn"><strong>নর্ম</strong> হলো একটা ভেক্টরের "আকার" বা "দৈর্ঘ্য" পরিমাপ করার পদ্ধতি।</p>
    <br>
    <p class="bn"><span style="color:var(--blue)">L1 নর্ম (Manhattan):</span> শহরের রাস্তায় হাঁটার মতো — শুধু সরাসরি উত্তর-দক্ষিণ বা পূর্ব-পশ্চিম যেতে পারবে। মোট দূরত্ব = |x| + |y|।</p>
    <br>
    <p class="bn"><span style="color:var(--green)">L2 নর্ম (Euclidean):</span> সরল রেখায় দূরত্ব — পাখি যেভাবে উড়ে যায়। দূরত্ব = √(x² + y²)।</p>
    <br>
    <p class="bn"><strong>Regularization-এ:</strong></p>
    <p class="bn">• L1 = Lasso → অনেক weight শূন্য করে দেয় → sparse model → feature selection</p>
    <p class="bn">• L2 = Ridge → সব weight ছোট করে → smooth model → overfitting কমায়</p>
  </div>

  <div class="card">
    <div class="card-title"><span class="icon">📐</span> FORMULAS</div>
    <div class="formula-label">Norms for vector x = [3, -4, 0, 2]</div>
    <div class="formula-box">L1: ||x||₁ = |3| + |-4| + |0| + |2| = 3+4+0+2 = <span style="color:var(--blue)">9</span>
L2: ||x||₂ = √(3²+4²+0²+2²) = √(9+16+0+4) = √29 ≈ <span style="color:var(--green)">5.39</span>
L∞: ||x||∞ = max(3,4,0,2) = <span style="color:var(--gold)">4</span>

Normalized (L2): x̂ = x/||x||₂ = [3,−4,0,2]/5.39 ≈ [0.56,−0.74,0,0.37]</div>
    <div class="formula-label">L1 vs L2 Regularization in Loss Functions</div>
    <div class="formula-box">Standard loss:   L = (1/n)Σ(yᵢ - ŷᵢ)²

L1 (Lasso):  L₁ = L + <span style="color:var(--blue)">λΣ|wⱼ|</span>        → promotes sparsity
L2 (Ridge):  L₂ = L + <span style="color:var(--green)">λΣwⱼ²</span>           → promotes small weights
Elastic Net: Lₑ = L + <span style="color:var(--purple)">λ₁Σ|wⱼ| + λ₂Σwⱼ²</span>  → best of both</div>
    <div class="formula-label">Why L1 creates sparsity (geometric intuition)</div>
    <div class="formula-box">L1 ball = diamond shape ◇ (corners on axes)
L2 ball = circle/sphere shape ○

When loss contours meet the constraint ball:
L1: tends to hit at CORNERS where some coords = 0 → SPARSE
L2: tends to hit at edges → small but non-zero weights</div>
  </div>

  <div class="analogy-box">
    <div class="card-title"><span class="icon">🎯</span> ANALOGY — Taxi vs Bird</div>
    <p>Imagine traveling from (0,0) to (3,4) in a city:</p>
    <ul style="padding-left:16px">
      <li>🚕 <span class="hl-blue">L1 (taxi)</span>: Must follow grid streets. Distance = 3+4 = 7 blocks. (Manhattan distance!)</li>
      <li>🐦 <span class="hl-green">L2 (bird)</span>: Flies in a straight line. Distance = √(9+16) = 5. (Euclidean!)</li>
      <li>🏁 <span class="hl-gold">L∞ (chess king)</span>: Maximum of x or y move. Distance = max(3,4) = 4. (How many moves for a chess king?)</li>
    </ul>
    <p class="bn" style="margin-top:8px">বাংলায়: L1=ট্যাক্সি (রাস্তা ধরে), L2=পাখি (সরল রেখা), L∞=দাবার রাজা (সর্বোচ্চ চাল)।</p>
  </div>

  <div class="ml-app-box">
    <h4>🤖 ML Application — Norms Are Everywhere in ML!</h4>
    <table>
      <tr><th>ML Context</th><th>Norm Used</th><th>Why</th></tr>
      <tr><td>Gradient clipping</td><td>L2 norm of gradient</td><td>Prevent exploding gradients: if ||g||₂ > threshold, scale down</td></tr>
      <tr><td>Weight decay (L2 reg)</td><td>L2 of weights</td><td>Keep weights small, prevent overfitting</td></tr>
      <tr><td>Lasso feature selection</td><td>L1 of weights</td><td>Drive irrelevant features to exactly zero</td></tr>
      <tr><td>Batch normalization</td><td>L2 norm</td><td>Normalize feature vectors to unit sphere</td></tr>
      <tr><td>Word vector similarity</td><td>Cosine = normalized dot product</td><td>Direction, not magnitude</td></tr>
      <tr><td>Adversarial examples</td><td>L∞ perturbation</td><td>Constrain max pixel change</td></tr>
      <tr><td>Distance-based models (KNN)</td><td>L2 (or L1)</td><td>Find nearest neighbors</td></tr>
    </table>
  </div>

  <div class="card">
    <div class="card-title"><span class="icon">💼</span> INTERVIEW Q&A</div>
    <div class="qa-item">
      <div class="q" onclick="toggleQ(this)">Q1: When would you choose L1 regularization over L2? <span class="q-arrow">▶</span></div>
      <div class="a">Choose L1 (Lasso) when: (1) You believe most features are irrelevant and want automatic feature selection. (2) You want an interpretable sparse model. (3) You have thousands of features but only a few should matter (e.g., genomics). (4) You want to identify which genes/features actually matter. Choose L2 (Ridge) when: (1) You believe all features contribute a little. (2) You have multicollinearity. (3) You need differentiable loss everywhere (L1 is not at 0). Choose Elastic Net when you want both sparsity and stability.<br><br><span class="bn">বাংলায়: L1 ব্যবহার করো যখন অপ্রয়োজনীয় feature শূন্য করতে চাও। L2 ব্যবহার করো যখন সব feature ছোট করতে চাও।</span></div>
    </div>
    <div class="qa-item">
      <div class="q" onclick="toggleQ(this)">Q2: What is gradient clipping and why use L2 norm for it? <span class="q-arrow">▶</span></div>
      <div class="a">Gradient clipping prevents exploding gradients in RNNs and transformers. If the L2 norm of all gradients ||g||₂ exceeds a threshold (e.g., 1.0), scale all gradients by threshold/||g||₂. Why L2 norm? Because it measures the "overall magnitude" of the gradient vector, treating all parameters jointly. Clipping by L2 norm preserves the direction of the gradient update while bounding its magnitude — safer than clipping each gradient independently (L∞ clipping changes the direction).<br><br><span class="bn">বাংলায়: gradient clipping gradient-এর দৈর্ঘ্য সীমিত রাখে training stable করতে।</span></div>
    </div>
    <div class="qa-item">
      <div class="q" onclick="toggleQ(this)">Q3: What is the difference between L2 loss (MSE) and L2 regularization (Ridge)? <span class="q-arrow">▶</span></div>
      <div class="a">They're both based on L2 norm but serve different purposes. L2 loss (MSE) = (1/n)Σ(yᵢ-ŷᵢ)² — measures prediction error, how wrong your predictions are. L2 regularization (Ridge) = λΣwⱼ² — penalizes large weights, prevents overfitting. In Ridge Regression, you minimize BOTH: MSE_loss + λ||w||₂². The loss measures accuracy, the regularization term measures model complexity. They're combined in the total objective function.<br><br><span class="bn">বাংলায়: L2 loss = ভুল prediction-এর শাস্তি। L2 regularization = বড় weight-এর শাস্তি। দুটো ভিন্ন উদ্দেশ্যে ব্যবহার হয়।</span></div>
    </div>
  </div>

      <h4>Exercise 1</h4>

      <p style="color:var(--muted);font-size:0.88em;margin-top:6px">L1 = 1+2+3+4 = 10. L2 = √(1+4+9+16) = √30 ≈ 5.48. L∞ = max(1,2,3,4) = 4</p>
    </div>
    <div class="exercise-box">
      <h4>Exercise 2 (Regularization)</h4>
      <p>Your model has weights w = [0.8, 0.1, 3.2, 0.05, 2.1]. Which weights does L1 regularization most aggressively push toward zero? Why?</p>
      <p style="color:var(--muted);font-size:0.88em;margin-top:6px">L1 pushes small weights (0.1, 0.05) to zero first — they're easiest to eliminate. L2 pushes the large weights (3.2, 2.1) more strongly (gradient proportional to value). L1 creates sparsity; L2 "squeezes" all weights.</p>
    </div>

const navLabels = [
  "Scalars, Vectors, Matrices, Tensors","Vector & Matrix Operations",
  "Dot Product & Geometric","Matrix Multiplication","Identity, Transpose, Inverse",
  "Rank of a Matrix","Systems of Linear Equations","Linear Transformations",
  "Column Space & Null Space","Eigenvalues & Eigenvectors","Orthogonality","Norms & Distances (L1, L2)"
];

function buildNav() {
  const nb = document.getElementById('nav-buttons');
  navLabels.forEach((label, i) => {
    const btn = document.createElement('button');
    btn.className = 'topic-btn' + (i===0?' active':'');
    btn.innerHTML = `<span class="topic-num">${String(i+1).padStart(2,'0')}</span><span>${label}</span>`;
    btn.onclick = () => showTopic(i);
    nb.appendChild(btn);
  });
}

function buildContent() {
  const main = document.getElementById('main-content');
  topics.forEach((topic, i) => {
    const sec = document.createElement('section');
    sec.className = 'topic-section' + (i===0?' active':'');
    sec.id = 'topic-' + i;
    sec.innerHTML = `
      <div class="topic-header">
        <div class="topic-title">📚 ${topic.title}</div>
        <div class="topic-subtitle">${topic.bn_title}</div>
        <div class="topic-tags">${topic.tags.map(t=>`<span class="tag tag-ml">${t}</span>`).join('')}</div>
      </div>
      ${topic.content}`;
    main.appendChild(sec);
  });
}

function showTopic(idx) {
  idx = parseInt(idx);
  document.querySelectorAll('.topic-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('topic-' + idx).classList.add('active');
  document.querySelectorAll('.topic-btn')[idx]?.classList.add('active');
  document.getElementById('progress').style.width = ((idx+1)/topics.length*100)+'%';
  window.scrollTo({top:0,behavior:'smooth'});
}

function toggleQ(el) {
  el.classList.toggle('open');
  const a = el.nextElementSibling;
  a.classList.toggle('open');
}

buildNav();
buildContent();
</script>
